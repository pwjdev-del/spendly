version: 1
# Trigger Deployment 58 - Fixed .agent symlink issue
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
        - echo "DATABASE_URL=$DATABASE_URL" >> .env
        - echo "AUTH_SECRET=$AUTH_SECRET" >> .env
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env
        - echo "AUTH_TRUST_HOST=true" >> .env
        - echo "AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-$GOOGLE_CLIENT_ID}" >> .env
        - echo "AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-$GOOGLE_CLIENT_SECRET}" >> .env
        - echo "NVIDIA_API_KEY=$NVIDIA_API_KEY" >> .env
        - echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
        - echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env
        - npx prisma db push --accept-data-loss --skip-generate
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
